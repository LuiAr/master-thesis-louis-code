<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vegetation Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ---- header ---- */
    header {
      background: #fff;
      border-bottom: 1px solid #e4e6ea;
      padding: 20px 40px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #111;
    }
    header p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 2px;
    }

    /* ---- main layout ---- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    /* ---- upload section ---- */
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .upload-zone {
      background: #fff;
      border: 2px dashed #d0d5dd;
      border-radius: 14px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
      min-height: 200px;
      justify-content: center;
      gap: 10px;
    }
    .upload-zone:hover { border-color: #6c7cff; background: #fafaff; }
    .upload-zone.has-image { border-style: solid; border-color: #6c7cff; padding: 0; overflow: hidden; }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-zone .icon {
      font-size: 2.2rem;
      pointer-events: none;
    }
    .upload-zone .label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #555;
      pointer-events: none;
    }
    .upload-zone .sub {
      font-size: 0.78rem;
      color: #aaa;
      pointer-events: none;
    }
    .upload-zone .preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 12px;
      max-height: 260px;
    }
    .upload-zone .change-hint {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 0.75rem;
      text-align: center;
      padding: 6px;
      border-radius: 0 0 12px 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .upload-zone.has-image:hover .change-hint { opacity: 1; }

    /* ---- analyse button ---- */
    .action-row {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }
    #btn-analyse {
      background: #3d4ef5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 44px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #btn-analyse:hover { background: #2c3ce0; }
    #btn-analyse:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-analyse .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    #btn-analyse.loading .spinner { display: block; }
    #btn-analyse.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- error banner ---- */
    #error-banner {
      display: none;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 10px;
      padding: 14px 18px;
      color: #c0392b;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* ---- results ---- */
    #results { display: none; }

    .results-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .result-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .result-image-wrap {
      position: relative;
      width: 100%;
      background: #f0f0f0;
    }
    .result-image-wrap img {
      width: 100%;
      display: block;
      max-height: 320px;
      object-fit: cover;
    }

    .decision-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 7px 18px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }
    .decision-badge.stop {
      background: rgba(220, 53, 69, 0.88);
      color: #fff;
    }
    .decision-badge.continue {
      background: rgba(40, 167, 69, 0.88);
      color: #fff;
    }
    .decision-badge.unknown {
      background: rgba(108, 117, 125, 0.88);
      color: #fff;
    }

    .result-body {
      padding: 22px 22px 26px;
    }

    .confidence-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .confidence-pip {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }
    .confidence-pip.high { background: #28a745; }
    .confidence-pip.medium { background: #ffc107; }
    .confidence-pip.low { background: #dc3545; }
    .confidence-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #888;
    }

    .field-block { margin-bottom: 18px; }
    .field-block:last-child { margin-bottom: 0; }
    .field-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 5px;
    }
    .field-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #2c2c3a;
    }

    .divider {
      height: 1px;
      background: #f0f0f5;
      margin: 16px 0;
    }

    .decision-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 10px;
      margin-top: 4px;
    }
    .decision-summary.stop { background: #fff5f5; }
    .decision-summary.continue { background: #f0fff4; }
    .decision-icon { font-size: 1.3rem; }
    .decision-text {
      font-size: 0.88rem;
      font-weight: 600;
      color: #333;
    }
    .decision-text span { font-weight: 400; color: #666; }

    /* ---- skeleton loader ---- */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<header>
  <h1>Vegetation Analysis</h1>
  <p>Upload two images to compare how the vision system reasons about each plant</p>
</header>

<main>

  <div class="upload-row">
    <div class="upload-zone" id="zone-a">
      <input type="file" id="file-a" accept="image/*" />
      <div class="icon">🌹</div>
      <div class="label">Image A</div>
      <div class="sub">Click to select or drag an image here</div>
      <div class="change-hint">Click to change image</div>
    </div>
    <div class="upload-zone" id="zone-b">
      <input type="file" id="file-b" accept="image/*" />
      <div class="icon">🌿</div>
      <div class="label">Image B</div>
      <div class="sub">Click to select or drag an image here</div>
      <div class="change-hint">Click to change image</div>
    </div>
  </div>

  <div class="action-row">
    <button id="btn-analyse" disabled>
      <div class="spinner"></div>
      <span class="btn-text">Analyse both images</span>
    </button>
  </div>

  <div id="error-banner"></div>

  <div id="results">
    <div class="results-row">
      <div class="result-card" id="card-a"></div>
      <div class="result-card" id="card-b"></div>
    </div>
  </div>

</main>

<script>
  const fileA = document.getElementById('file-a');
  const fileB = document.getElementById('file-b');
  const zoneA = document.getElementById('zone-a');
  const zoneB = document.getElementById('zone-b');
  const btn   = document.getElementById('btn-analyse');
  const errorBanner = document.getElementById('error-banner');
  const results = document.getElementById('results');

  let selectedA = null;
  let selectedB = null;

  function showPreview(zone, file) {
    const existing = zone.querySelector('.preview');
    if (existing) existing.remove();
    const inner = zone.querySelectorAll('.icon, .label, .sub');
    inner.forEach(el => el.style.display = 'none');
    const img = document.createElement('img');
    img.className = 'preview';
    img.src = URL.createObjectURL(file);
    zone.insertBefore(img, zone.querySelector('.change-hint'));
    zone.classList.add('has-image');
  }

  fileA.addEventListener('change', () => {
    if (fileA.files[0]) {
      selectedA = fileA.files[0];
      showPreview(zoneA, selectedA);
    }
    updateBtn();
  });

  fileB.addEventListener('change', () => {
    if (fileB.files[0]) {
      selectedB = fileB.files[0];
      showPreview(zoneB, selectedB);
    }
    updateBtn();
  });

  function updateBtn() {
    btn.disabled = !(selectedA && selectedB);
  }

  function setLoading(on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  function decisionClass(d) {
    if (d === 'STOP') return 'stop';
    if (d === 'CONTINUE') return 'continue';
    return 'unknown';
  }

  function decisionEmoji(d) {
    if (d === 'STOP') return '🛑';
    if (d === 'CONTINUE') return '✅';
    return '❓';
  }

  function decisionDescription(d) {
    if (d === 'STOP') return '<span>Ornamental plant detected &mdash; the mower must not proceed</span>';
    if (d === 'CONTINUE') return '<span>Wild vegetation &mdash; safe to mow</span>';
    return '<span>Could not determine</span>';
  }

  function confidencePip(c) {
    const cls = (c || '').toLowerCase();
    return `<span class="confidence-pip ${cls}"></span><span class="confidence-label">${c || 'Unknown'} confidence</span>`;
  }

  function renderCard(container, data) {
    const dc = decisionClass(data.decision);
    container.innerHTML = `
      <div class="result-image-wrap">
        <img src="data:image/jpeg;base64,${data.image_b64}" alt="Analysis result" />
        <div class="decision-badge ${dc}">${data.decision || 'UNKNOWN'}</div>
      </div>
      <div class="result-body">
        <div class="confidence-row">${confidencePip(data.confidence)}</div>

        ${data.observation ? `
        <div class="field-block">
          <div class="field-title">Observation</div>
          <div class="field-text">${data.observation}</div>
        </div>` : ''}

        ${data.reasoning ? `
        <div class="divider"></div>
        <div class="field-block">
          <div class="field-title">Reasoning</div>
          <div class="field-text">${data.reasoning}</div>
        </div>` : ''}

        <div class="divider"></div>
        <div class="decision-summary ${dc}">
          <span class="decision-icon">${decisionEmoji(data.decision)}</span>
          <div class="decision-text">${decisionDescription(data.decision)}</div>
        </div>
      </div>
    `;
  }

  function showSkeleton(container) {
    container.innerHTML = `
      <div style="background:#f0f0f0;height:240px;border-radius:16px 16px 0 0;"></div>
      <div style="padding:22px">
        <div class="skeleton" style="height:14px;width:60%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:12px;width:90%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:80%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:70%;margin-bottom:20px;"></div>
        <div class="skeleton" style="height:12px;width:95%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:88%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:75%;"></div>
      </div>
    `;
  }

  btn.addEventListener('click', async () => {
    if (!selectedA || !selectedB) return;

    errorBanner.style.display = 'none';
    setLoading(true);
    results.style.display = 'block';
    showSkeleton(document.getElementById('card-a'));
    showSkeleton(document.getElementById('card-b'));

    const form = new FormData();
    form.append('image_a', selectedA);
    form.append('image_b', selectedB);

    try {
      const resp = await fetch('/api/analyse', { method: 'POST', body: form });
      const data = await resp.json();

      if (!resp.ok || data.error) {
        throw new Error(data.error || `Server error ${resp.status}`);
      }

      renderCard(document.getElementById('card-a'), data.a);
      renderCard(document.getElementById('card-b'), data.b);

    } catch (err) {
      results.style.display = 'none';
      errorBanner.textContent = err.message;
      errorBanner.style.display = 'block';
    } finally {
      setLoading(false);
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
